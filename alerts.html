<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts - Pollution Control System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🌍 Pollution Control</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="sensors.html" class="nav-item">
                    <span class="nav-icon">📡</span>
                    <span>Sensors</span>
                </a>
                <a href="alerts.html" class="nav-item active">
                    <span class="nav-icon">🔔</span>
                    <span>Alerts</span>
                </a>
                <a href="reports.html" class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span>Reports</span>
                </a>
                <a href="#" class="nav-item logout">
                    <span class="nav-icon">🚪</span>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <h1 class="page-title">Alerts</h1>
                <div class="header-right">
                    <div class="system-status" id="systemStatus">
                        <span class="status-dot normal"></span>
                        <span>System Normal</span>
                    </div>
                    <div class="user-icon">👤</div>
                </div>
            </header>

            <!-- Filter Buttons -->
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All Alerts</button>
                <button class="filter-btn" data-filter="critical">Critical</button>
                <button class="filter-btn" data-filter="warning">Warning</button>
                <button class="filter-btn" data-filter="normal">Normal</button>
            </div>

            <!-- Alerts List -->
            <div class="alerts-full-list" id="alertsFullList">
                <!-- Alerts will be populated here -->
                <div class="alert-item normal">
                    <div class="alert-icon">ℹ️</div>
                    <div class="alert-content">
                        <p>System running normal - Zone A</p>
                        <small>10:15 AM</small>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/alerts-page.js"></script>
</body>
</html>
